name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        name: Build

      - run: pnpm check
        name: Type check

      - uses: actions/cache@v5
        id: fixtures-cache
        with:
          path: tests/fixtures/live
          key: dku-fixtures-${{ hashFiles('scripts/download-fixtures.ts') }}-week-${{ github.run_number }}
          restore-keys: |
            dku-fixtures-${{ hashFiles('scripts/download-fixtures.ts') }}-

      - run: pnpm fixtures:sync
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        name: Download fixtures

      - run: pnpm test
        name: Unit tests

      - run: pnpm exec tsx tests/bench-parser.ts
        name: Parser benchmark

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e "process.stdout.write(require('@playwright/test/package.json').version)")" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - run: pnpm exec playwright install --with-deps chromium firefox webkit
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        name: Install Playwright browsers

      - run: pnpm exec playwright install-deps chromium firefox webkit
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        name: Install Playwright system dependencies

      - run: pnpm test:e2e
        name: E2E smoke tests
